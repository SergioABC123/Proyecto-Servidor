<!DOCTYPE html>
<html lang="en">

<head>
    <title>Práctica 1</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/styles.css">


    <script>
        function toggleForms() {
            let form_login = document.getElementById('formLogin'),
                form_register = document.getElementById('formRegister');
            if (form_register.style.display == 'none') {
                form_login.style.display = 'none';
                form_register.style.display = 'block';
            }
            else {
                form_login.style.display = 'block';
                form_register.style.display = 'none';
            }
        }
    </script>

</head>

<body class="d-flex align-items-center justify-content-center vh-100 inicio">
    <div class="card"> 
        <form id="formLogin" action="P01_home.html" style=" margin: 10px">
            <div class="mb-3 mt-3">
                <label for="email" class="form-label">Correo</label>
                <input type="email" class="form-control ingreso" id="email" placeholder="Test@gmail.com" name="email"
                    required=true>
            </div>

            <div class="mb-3">
                <label for="pwd" class="form-label">Contraseña</label>
                <input type="password" class="form-control ingreso" id="pwd" name="pswd" required=true>
            </div>

            <div class="d-flex flex-column align-items-center gap-2">
                <button type="submit" class="btn btn-primary btn-register">Iniciar sesión</button>
                <button type="button" class="btn btn-secondary btn-register"
                    onclick="toggleForms()">Registrarse</button>
            </div>
        </form>

        <form id="formRegister" action="javascript:alert('Registro exitoso'); toggleForms();" style="display:none; margin: 20px">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control ingreso" id="nombre" placeholder="Sergio Orozco" name="nombre"
                    required>
            </div>
            <div class="mb-3">
                <label for="emailRegister" class="form-label">Correo</label>
                <input type="email" class="form-control ingreso" id="emailRegister" placeholder="Test@gmail.com"
                    name="email" required>
            </div>
            <div class="mb-3">
                <label for="pwdRegister" class="form-label">Contraseña</label>
                <input type="password" class="form-control ingreso" id="pwdRegister" name="pswd" required>
            </div>
            <div class="mb-3">
                <label for="pwdConfirm" class="form-label">Confirmar contraseña</label>
                <input type="password" class="form-control ingreso" id="pwdConfirm" name="pswdConfirm" required>
            </div>
            <div class="d-flex flex-column align-items-center gap-2">
                <button type="submit" class="btn btn-primary btn-register">Crear cuenta</button>
                <button type="button" class="btn btn-secondary btn-register" onclick="toggleForms()">Iniciar sesión</button>
            </div>
        </form>
    </div>
</body>

</html>
